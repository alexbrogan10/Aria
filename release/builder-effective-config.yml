directories:
  output: release
  buildResources: build-assets
appId: com.yourorg.aria
productName: Aria
copyright: Copyright © 2025 Your Name
files:
  - filter:
      - dist/**/*
      - electron-dist/**/*
      - public/**/*
mac:
  category: public.app-category.music
  icon: build-assets/icon.icns
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build-assets/entitlements.mac.plist
  entitlementsInherit: build-assets/entitlements.mac.plist
  target:
    - target: dmg
      arch:
        - x64
        - arm64
    - target: zip
      arch:
        - x64
        - arm64
dmg:
  title: Aria ${version}
  background: build-assets/dmg-background.png
  icon: build-assets/icon.icns
  iconSize: 80
  contents:
    - x: 190
      'y': 170
      type: file
    - x: 490
      'y': 170
      type: link
      path: /Applications
win:
  icon: build-assets/icon.ico
  target:
    - target: nsis
      arch:
        - x64
    - target: portable
      arch:
        - x64
  publisherName: Aria
  forceCodeSigning: false
  signingHashAlgorithms: null
  sign: null
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  installerIcon: build-assets/icon.ico
  uninstallerIcon: build-assets/icon.ico
  createDesktopShortcut: true
  createStartMenuShortcut: true
linux:
  icon: build-assets/icon.png
  category: Audio
  target:
    - AppImage
    - deb
    - rpm
fileAssociations:
  - ext: aria.json
    name: Aria Score
    description: Aria music notation file
    role: Editor
  - ext: musicxml
    name: MusicXML
    description: MusicXML file
    role: Editor
protocols:
  - name: Aria
    schemes:
      - aria
electronVersion: 31.7.7
